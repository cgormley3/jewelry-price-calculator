# Shopify app configuration
# Run: shopify app config link (to link to your app)
# See: https://shopify.dev/docs/apps/build/cli-for-apps/app-configuration

name = "The Vault"
client_id = "0c12a934d06a55a3875e6a44e729b0d5"
application_url = "https://vault.bearsilverandstone.com"

[webhooks]
api_version = "2025-01"

# Mandatory compliance webhooks (required for App Store)
# Endpoint: app/api/shopify/webhooks/route.ts - verifies HMAC, handles all three topics
[[webhooks.subscriptions]]
uri = "https://vault.bearsilverandstone.com/api/shopify/webhooks"
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
