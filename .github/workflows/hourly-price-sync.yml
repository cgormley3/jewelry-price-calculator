name: Daily Price Sync
on:
  schedule:
    - cron: '30 17 * * *' 
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Prices
        run: |
          # Pings API (fetches from spreadsheet) and saves to prices.json
          curl -s "https://jewelry-price-calculator-gamma.vercel.app/api/gold-price" > prices.json

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "💎 Daily Market Update (10:30 AM MT)"
          file_pattern: 'prices.json'